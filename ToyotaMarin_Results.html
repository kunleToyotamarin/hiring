<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toyota Marin Hiring Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f4f5f7;color:#1a1a2e;font-size:14px;}
.header{background:#1a1a2e;color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header h1{font-size:16px;font-weight:700;}
.header p{font-size:12px;color:#9ca3af;margin-top:2px;}
.btn-logout{background:transparent;color:#9ca3af;border:1px solid #374151;padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-logout:hover{color:#fff;border-color:#9ca3af;}
.main{max-width:1100px;margin:24px auto;padding:0 20px 60px;}

.login-wrap{max-width:400px;margin:80px auto;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:40px;text-align:center;}
.login-wrap h2{font-size:20px;font-weight:700;margin-bottom:8px;}
.login-wrap p{font-size:13px;color:#6b7280;margin-bottom:24px;}
.pw-input{width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:15px;text-align:center;letter-spacing:0.1em;}
.pw-input:focus{outline:none;border-color:#cc0000;}
.btn-login{background:#cc0000;color:#fff;border:none;padding:13px 36px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:12px;}
.btn-login:hover{background:#aa0000;}
.pw-error{color:#cc0000;font-size:12px;margin-top:8px;display:none;}

.dash{display:none;}
.dash.active{display:block;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center;}
.stat-val{font-size:28px;font-weight:700;color:#cc0000;}
.stat-label{font-size:11px;color:#6b7280;margin-top:3px;}

.filters{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px;margin-bottom:18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:12px;color:#6b7280;font-weight:600;}
select{padding:7px 12px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;color:#1a1a2e;background:#fff;}
.btn-refresh{background:#1a1a2e;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;}

.table-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th{background:#1a1a2e;color:#fff;padding:11px 14px;font-size:11px;font-weight:700;text-align:left;white-space:nowrap;}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid #f0f0f0;color:#374151;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.verdict-strong{background:#f0fdf4;color:#166534;font-weight:700;padding:3px 10px;border-radius:4px;font-size:11px;}
.verdict-border{background:#fffbeb;color:#92400e;font-weight:700;padding:3px 10px;border-radius:4px;font-size:11px;}
.verdict-below{background:#fef2f2;color:#991b1b;font-weight:700;padding:3px 10px;border-radius:4px;font-size:11px;}
.score-num{font-weight:700;}
.score-high{color:#166534;}
.score-mid{color:#d97706;}
.score-low{color:#cc0000;}
.manager-score{display:inline-block;background:#f3f4f6;color:#374151;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px;}
.manager-score.scored{background:#eff6ff;color:#1d4ed8;}
.manager-score.pending{background:#f9fafb;color:#9ca3af;font-style:italic;}
.expand-btn{background:none;border:none;color:#cc0000;font-size:11px;cursor:pointer;padding:0;font-weight:600;}
.download-btn{background:#1a1a2e;color:#fff;border:none;padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;margin-left:6px;}
.download-btn:hover{background:#0d0d1a;}
.download-options{display:flex;gap:6px;align-items:center;}
.download-select{padding:4px 8px;font-size:10px;border:1px solid #e5e7eb;border-radius:4px;background:#fff;color:#374151;}
.detail-row{display:none;}
.detail-row.open{display:table-row;}
.detail-cell{background:#f8f9fa;padding:16px 20px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detail-section{font-size:11px;}
.detail-section-title{font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6b7280;margin-bottom:8px;}
.answer-preview{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:10px 12px;font-size:11px;color:#374151;line-height:1.6;margin-bottom:8px;font-style:italic;}
.probe-item{font-size:11px;color:#374151;margin-bottom:5px;line-height:1.5;padding-left:10px;position:relative;}
.probe-item::before{content:'•';position:absolute;left:0;color:#cc0000;}
.no-data{text-align:center;padding:48px;color:#9ca3af;font-size:14px;}
@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .detail-grid{grid-template-columns:1fr;}
  table{font-size:11px;}
  th,td{padding:8px 10px;}
}
</style>
</head>
<body>

<div class="header" id="main-header" style="display:none;">
  <div>
    <h1>Toyota Marin Hiring Dashboard</h1>
    <p id="header-date"></p>
  </div>
  <button class="btn-logout" onclick="logout()">Log out</button>
</div>

<div class="main">
  <div id="login-section">
    <div class="login-wrap">
      <h2>Toyota Marin Hiring Dashboard</h2>
      <p>Enter the manager password to access candidate results</p>
      <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
      <button class="btn-login" onclick="tryLogin()">Access dashboard</button>
      <div class="pw-error" id="pw-error">Incorrect password — try again</div>
    </div>
  </div>

  <div class="dash" id="dashboard">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Total candidates</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-strong" style="color:#166534;">0</div><div class="stat-label">Strong</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-border" style="color:#d97706;">0</div><div class="stat-label">Borderline</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-below" style="color:#cc0000;">0</div><div class="stat-label">Below threshold</div></div>
    </div>
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <select id="filter-verdict" onchange="renderTable()">
        <option value="all">All verdicts</option>
        <option value="STRONG">Strong only</option>
        <option value="BORDERLINE">Borderline only</option>
        <option value="BELOW THRESHOLD">Below threshold only</option>
      </select>
      <select id="filter-sort" onchange="renderTable()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="score-desc">Highest score first</option>
        <option value="score-asc">Lowest score first</option>
      </select>
      <button class="btn-refresh" onclick="loadData()">Refresh data</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Candidate</th>
            <th>Date</th>
            <th>MC Score</th>
            <th>Written scores</th>
            <th>Combined</th>
            <th>Verdict</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'Toyotamarin';
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFKiScDtl4GBZzIUnTPmSyO1onnmEcveVrXpCdG1pEuDyWvRT-XFLM2eL8OEKlGlpcGw/exec';
const MANAGERS = ['Kunle','Joel','Brandon','Omar'];

let allCandidates = [];
let authenticated = false;

function tryLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === PASSWORD){
    authenticated = true;
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('dashboard').classList.add('active');
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    loadData();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function logout(){
  authenticated = false;
  document.getElementById('login-section').style.display = 'block';
  document.getElementById('main-header').style.display = 'none';
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('pw-input').value = '';
}

function loadData(){
  if(false){
    allCandidates = getSampleData();
    renderStats();
    renderTable();
    return;
  }
  fetch(GOOGLE_SCRIPT_URL+'?action=getAll')
    .then(r=>r.json())
    .then(data=>{
      allCandidates = data;
      renderStats();
      renderTable();
    })
    .catch(()=>{
      allCandidates = getSampleData();
      renderStats();
      renderTable();
    });
}

function getSampleData(){
  return [
    {
      candidateName:'Sample Candidate A',
      timestamp:new Date().toISOString(),
      total:62, maxMCScore:80, pct:78, tm:'14:22', verdict:'STRONG',
      secScores:[
        {label:'Money drive',raw:14,max:16},{label:'Sales judgment',raw:14,max:16},
        {label:'Auto math',raw:12,max:16},{label:'Coachability',raw:12,max:16},
        {label:'One-price alignment',raw:6,max:8},{label:'A2Z finance process',raw:4,max:4},
        {label:'Pressure & history',raw:0,max:4}
      ],
      openAnswers:{q3:'Money means freedom and proving to myself that hard work pays off.',q8:'At my last dealership I sold the certified pre-owned cars which were $2,000 more than similar non-certified. I focused on the warranty, inspection, and peace of mind.',q16:'My manager told me to stop discounting so quickly. I disagreed at first but watched my gross go up significantly when I held firm.',q20:'I specifically want Toyota Marin because I\'ve heard the A2Z model is more professional and I want to learn the full process.',q23:'2022-2023: Sales rep at ABC Honda, 14 months, left for better opportunity. 2023-2024: Sales rep at XYZ Toyota, 18 months, store closed.'},
      managerScores:{},
      probes:['Math skills are slightly weak — verify in interview','One-price concern flagged — probe their comfort level']
    }
  ];
}

function renderStats(){
  document.getElementById('stat-total').textContent = allCandidates.length;
  document.getElementById('stat-strong').textContent = allCandidates.filter(c=>c.verdict==='STRONG').length;
  document.getElementById('stat-border').textContent = allCandidates.filter(c=>c.verdict==='BORDERLINE').length;
  document.getElementById('stat-below').textContent = allCandidates.filter(c=>c.verdict==='BELOW THRESHOLD').length;
}

function renderTable(){
  const verdict = document.getElementById('filter-verdict').value;
  const sort = document.getElementById('filter-sort').value;
  let data = verdict==='all' ? [...allCandidates] : allCandidates.filter(c=>c.verdict===verdict);
  if(sort==='date-desc') data.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  else if(sort==='date-asc') data.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  else if(sort==='score-desc') data.sort((a,b)=>b.pct-a.pct);
  else data.sort((a,b)=>a.pct-b.pct);

  const tbody = document.getElementById('table-body');
  if(data.length===0){
    tbody.innerHTML='<tr><td colspan="7" class="no-data">No candidates found. Adjust filters or check your Google Sheet connection.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map((c,i)=>{
    const date = new Date(c.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const mcColor = c.pct>=75?'score-high':c.pct>=55?'score-mid':'score-low';
    const verdictClass = c.verdict==='STRONG'?'verdict-strong':c.verdict==='BORDERLINE'?'verdict-border':'verdict-below';
    const mgrScores = MANAGERS.map(m=>{
      let ms = null;
      if(c.managerScores){
        // Try multiple key formats since spreadsheet may store differently
        ms = c.managerScores[m] || c.managerScores[m.toLowerCase()] || c.managerScores[m.toUpperCase()];
        if(!ms){
          // Try case-insensitive search
          const keys = Object.keys(c.managerScores);
          const matchKey = keys.find(k => String(k).toLowerCase() === m.toLowerCase());
          if(matchKey) ms = c.managerScores[matchKey];
        }
      }
      return '<span class="manager-score '+(ms?'scored':'pending')+'">'+(ms?m+': '+ms.total+'/20':m+': pending')+'</span>';
    }).join('');
    const validScores = c.managerScores ? Object.values(c.managerScores).filter(v=>v && v.total!==undefined) : [];
    const writtenTotal = validScores.reduce((a,v)=>a+(parseInt(v.total)||0),0);
    const writtenCount = validScores.length;
    const writtenAvg = writtenCount>0 ? Math.round(writtenTotal/writtenCount) : null;
    const combined = writtenAvg!==null ? c.total+' MC + '+writtenAvg+' avg written' : c.total+' MC only';
    return `<tr>
      <td style="font-weight:600;">${c.candidateName}</td>
      <td style="color:#6b7280;">${date}</td>
      <td><span class="score-num ${mcColor}">${c.total}/${c.maxMCScore} (${c.pct}%)</span></td>
      <td>${mgrScores}</td>
      <td style="font-weight:600;">${combined}</td>
      <td><span class="${verdictClass}">${c.verdict}</span></td>
      <td>
        <div class="download-options">
          <button class="expand-btn" onclick="toggleDetail(${i})">Details</button>
          <button class="download-btn" onclick="downloadCandidatePDF(${i}, 'summary')">Summary PDF</button>
          <button class="download-btn" onclick="downloadCandidatePDF(${i}, 'full')" style="background:#cc0000;">Full PDF</button>
        </div>
      </td>
    </tr>
    <tr class="detail-row" id="detail-${i}">
      <td colspan="7" class="detail-cell">
        <div class="detail-grid">
          <div>
            <div class="detail-section">
              <div class="detail-section-title">Section breakdown</div>
              ${(c.secScores||[]).map(s=>{
                if(s.label === 'Behavioral profile') return '';
                const sp=s.max>0?Math.round(s.raw/s.max*100):0;
                const bc=sp>=75?'#16a34a':sp>=50?'#d97706':'#cc0000';
                return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:11px;"><span>'+s.label+'</span><span style="font-weight:700;color:'+bc+'">'+s.raw+'/'+s.max+' ('+sp+'%)</span></div>';
              }).join('')}
              ${c.behavioralProfile && c.behavioralProfile.length > 0 ? `
                <div style="margin-top:14px;border-top:1px solid #e5e7eb;padding-top:12px;">
                  <div class="detail-section-title" style="margin-bottom:8px;">Behavioral profile</div>
                  ${c.behavioralProfile.map(b=>{
                    const dimNames = {drive:'Drive / Initiative',persistence:'Persistence',social:'Social orientation',process:'Process orientation',stress:'Stress response'};
                    const lc = b.lean.startsWith('Strong')&&!b.lean.includes('Reactive')&&!b.lean.includes('Quits')&&!b.lean.includes('Solo')&&!b.lean.includes('Improvises')?'#16a34a':
                              b.lean.startsWith('Moderate')?'#2563eb':
                              b.lean.startsWith('Slight')?'#d97706':'#cc0000';
                    return '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;"><span>'+dimNames[b.dimension]+'</span><span style="font-weight:700;color:'+lc+'">'+b.lean+'</span></div>';
                  }).join('')}
                </div>
              ` : ''}
            </div>
            <div class="detail-section" style="margin-top:14px;">
              <div class="detail-section-title">Suggested interview probes</div>
              ${(c.probes||[]).map(p=>'<div class="probe-item">'+p+'</div>').join('')}
            </div>
          </div>
          <div>
            <div class="detail-section">
              <div class="detail-section-title">Written answers</div>
              ${c.openAnswers ? Object.entries(c.openAnswers).map(([k,v])=>'<div class="answer-preview">'+v+'</div>').join('') : '<div style="color:#9ca3af;font-size:11px;">Not available</div>'}
            </div>
            ${c.interviews && c.interviews.length > 0 ? `
            <div class="detail-section" style="margin-top:14px;">
              <div class="detail-section-title">Interview results</div>
              ${c.interviews.map(iv => `
                <div style="background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:10px 12px;margin-bottom:8px;">
                  <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:6px;">
                    <span>${iv.manager}</span>
                    <span style="color:${iv.finalVerdict==='HIRE'?'#16a34a':iv.finalVerdict==='MAYBE'?'#d97706':'#cc0000'}">${iv.finalVerdict}</span>
                  </div>
                  <div style="font-size:10px;color:#6b7280;line-height:1.6;">
                    Scorecard: <strong>${iv.scorecardTotal}/100</strong> &nbsp;|&nbsp; 
                    Roleplay avg: <strong>${iv.roleplayAvg}/4</strong> (${iv.roleplayCount} done)
                  </div>
                  ${iv.finalNotes ? '<div style="font-size:11px;font-style:italic;color:#374151;margin-top:6px;line-height:1.5;">"'+iv.finalNotes+'"</div>' : ''}
                </div>
              `).join('')}
            </div>` : ''}
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function toggleDetail(i){
  const row = document.getElementById('detail-'+i);
  row.classList.toggle('open');
}

function downloadCandidatePDF(index, mode) {
  const data = document.getElementById('filter-verdict').value === 'all' ? [...allCandidates] : allCandidates.filter(c=>c.verdict===document.getElementById('filter-verdict').value);
  const sort = document.getElementById('filter-sort').value;
  if(sort==='date-desc') data.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  else if(sort==='date-asc') data.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  else if(sort==='score-desc') data.sort((a,b)=>b.pct-a.pct);
  else data.sort((a,b)=>a.pct-b.pct);
  
  const c = data[index];
  if(!c) return;
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'letter'});
  const pageWidth = doc.internal.pageSize.width;
  let y = 50;
  
  // ===== HEADER =====
  doc.setFillColor(26, 26, 46);
  doc.rect(0, 0, pageWidth, 80, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.setFont(undefined, 'bold');
  doc.text('TOYOTA MARIN — CANDIDATE REPORT', 40, 35);
  doc.setFontSize(10);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(180, 180, 180);
  doc.text('Generated: ' + new Date().toLocaleString(), 40, 55);
  doc.text('Confidential — for Sales Director / GM review', pageWidth - 40, 55, {align: 'right'});
  y = 110;
  
  // ===== CANDIDATE NAME & VERDICT =====
  doc.setTextColor(26, 26, 46);
  doc.setFontSize(22);
  doc.setFont(undefined, 'bold');
  doc.text(c.candidateName, 40, y);
  
  // Verdict badge
  const verdictColor = c.verdict === 'STRONG' ? [22, 101, 52] : c.verdict === 'BORDERLINE' ? [146, 64, 14] : [153, 27, 27];
  const verdictBg = c.verdict === 'STRONG' ? [240, 253, 244] : c.verdict === 'BORDERLINE' ? [254, 243, 199] : [254, 226, 226];
  doc.setFillColor(...verdictBg);
  doc.roundedRect(pageWidth - 180, y - 22, 140, 30, 4, 4, 'F');
  doc.setTextColor(...verdictColor);
  doc.setFontSize(13);
  doc.setFont(undefined, 'bold');
  doc.text(c.verdict, pageWidth - 110, y - 3, {align: 'center'});
  y += 12;
  
  doc.setTextColor(107, 114, 128);
  doc.setFontSize(10);
  doc.setFont(undefined, 'normal');
  doc.text('Assessment date: ' + new Date(c.timestamp).toLocaleDateString(), 40, y);
  y += 25;
  
  // ===== ASSESSMENT SCORE OVERVIEW =====
  doc.setFillColor(248, 249, 250);
  doc.rect(40, y, pageWidth - 80, 60, 'F');
  doc.setTextColor(204, 0, 0);
  doc.setFontSize(9);
  doc.setFont(undefined, 'bold');
  doc.text('ASSESSMENT OVERVIEW', 50, y + 18);
  doc.setTextColor(26, 26, 46);
  doc.setFontSize(20);
  doc.text(c.total + '/' + c.maxMCScore, 50, y + 45);
  doc.setFontSize(11);
  doc.setFont(undefined, 'normal');
  doc.text(c.pct + '%', 50, y + 58);
  
  doc.setFontSize(10);
  doc.setTextColor(107, 114, 128);
  doc.text('Time used: ' + c.tm, pageWidth/2, y + 30);
  doc.text('Pass threshold: 75%', pageWidth/2, y + 45);
  y += 80;
  
  // ===== SECTION BREAKDOWN =====
  doc.setTextColor(204, 0, 0);
  doc.setFontSize(10);
  doc.setFont(undefined, 'bold');
  doc.text('SECTION BREAKDOWN', 40, y);
  y += 8;
  
  const sectionRows = (c.secScores || []).filter(s => s.label !== 'Behavioral profile').map(s => {
    const sp = s.max > 0 ? Math.round(s.raw/s.max*100) : 0;
    return [s.label, s.raw + '/' + s.max, sp + '%'];
  });
  
  doc.autoTable({
    startY: y + 5,
    head: [['Section', 'Score', '%']],
    body: sectionRows,
    theme: 'plain',
    headStyles: {fillColor: [26, 26, 46], textColor: [255,255,255], fontSize: 9, fontStyle: 'bold'},
    bodyStyles: {fontSize: 9, textColor: [55, 65, 81]},
    alternateRowStyles: {fillColor: [248, 249, 250]},
    margin: {left: 40, right: 40},
    columnStyles: {1: {halign: 'center'}, 2: {halign: 'center', fontStyle: 'bold'}}
  });
  y = doc.lastAutoTable.finalY + 20;
  
  // ===== BEHAVIORAL PROFILE =====
  if(c.behavioralProfile && c.behavioralProfile.length > 0) {
    doc.setTextColor(204, 0, 0);
    doc.setFontSize(10);
    doc.setFont(undefined, 'bold');
    doc.text('BEHAVIORAL PROFILE', 40, y);
    y += 8;
    
    const dimNames = {drive:'Drive / Initiative', persistence:'Persistence', social:'Social orientation', process:'Process orientation', stress:'Stress response'};
    const bpRows = c.behavioralProfile.map(b => [dimNames[b.dimension] || b.dimension, b.lean]);
    
    doc.autoTable({
      startY: y + 5,
      head: [['Dimension', 'Profile']],
      body: bpRows,
      theme: 'plain',
      headStyles: {fillColor: [26, 26, 46], textColor: [255,255,255], fontSize: 9, fontStyle: 'bold'},
      bodyStyles: {fontSize: 9, textColor: [55, 65, 81]},
      alternateRowStyles: {fillColor: [248, 249, 250]},
      margin: {left: 40, right: 40},
      columnStyles: {1: {fontStyle: 'bold'}}
    });
    y = doc.lastAutoTable.finalY + 20;
  }
  
  // ===== MANAGER WRITTEN SCORES =====
  if(c.managerScores && Object.keys(c.managerScores).length > 0) {
    if(y > 600) { doc.addPage(); y = 50; }
    doc.setTextColor(204, 0, 0);
    doc.setFontSize(10);
    doc.setFont(undefined, 'bold');
    doc.text('MANAGER WRITTEN SCORES', 40, y);
    y += 8;
    
    const msRows = Object.entries(c.managerScores).map(([mgr, data]) => [mgr, data.total + '/20']);
    
    doc.autoTable({
      startY: y + 5,
      head: [['Manager', 'Written total']],
      body: msRows,
      theme: 'plain',
      headStyles: {fillColor: [26, 26, 46], textColor: [255,255,255], fontSize: 9, fontStyle: 'bold'},
      bodyStyles: {fontSize: 9, textColor: [55, 65, 81]},
      alternateRowStyles: {fillColor: [248, 249, 250]},
      margin: {left: 40, right: 40},
      columnStyles: {1: {halign: 'center', fontStyle: 'bold'}}
    });
    y = doc.lastAutoTable.finalY + 20;
  }
  
  // ===== INTERVIEW RESULTS =====
  if(c.interviews && c.interviews.length > 0) {
    if(y > 600) { doc.addPage(); y = 50; }
    doc.setTextColor(204, 0, 0);
    doc.setFontSize(10);
    doc.setFont(undefined, 'bold');
    doc.text('INTERVIEW RESULTS', 40, y);
    y += 8;
    
    const ivRows = c.interviews.map(iv => [
      iv.manager,
      iv.scorecardTotal + '/100',
      iv.roleplayAvg + '/4 (' + iv.roleplayCount + ' done)',
      iv.finalVerdict
    ]);
    
    doc.autoTable({
      startY: y + 5,
      head: [['Manager', 'Scorecard', 'Roleplay avg', 'Verdict']],
      body: ivRows,
      theme: 'plain',
      headStyles: {fillColor: [26, 26, 46], textColor: [255,255,255], fontSize: 9, fontStyle: 'bold'},
      bodyStyles: {fontSize: 9, textColor: [55, 65, 81]},
      alternateRowStyles: {fillColor: [248, 249, 250]},
      margin: {left: 40, right: 40},
      columnStyles: {1: {halign: 'center'}, 2: {halign: 'center'}, 3: {halign: 'center', fontStyle: 'bold'}}
    });
    y = doc.lastAutoTable.finalY + 15;
    
    // Manager notes
    c.interviews.forEach(iv => {
      if(iv.finalNotes) {
        if(y > 700) { doc.addPage(); y = 50; }
        doc.setFontSize(9);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(26, 26, 46);
        doc.text(iv.manager + ' notes:', 40, y);
        y += 12;
        doc.setFont(undefined, 'normal');
        doc.setTextColor(55, 65, 81);
        const noteLines = doc.splitTextToSize('"' + iv.finalNotes + '"', pageWidth - 80);
        doc.text(noteLines, 40, y);
        y += noteLines.length * 11 + 8;
      }
    });
    y += 10;
  }
  
  // ===== FULL DETAIL ONLY =====
  if(mode === 'full') {
    // Written answers
    if(c.openAnswers) {
      if(y > 500) { doc.addPage(); y = 50; }
      doc.setTextColor(204, 0, 0);
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text('CANDIDATE WRITTEN ANSWERS', 40, y);
      y += 18;
      
      const labels = {q3:'Q4 — What money means to you', q8:'Q9 — Selling not the cheapest option', q16:'Q17 — Disagreement with a manager', q20:'Q21 — Why Toyota Marin specifically', q23:'Q24 — Work history last 5 years'};
      
      Object.entries(c.openAnswers).forEach(([k, v]) => {
        if(!v) return;
        if(y > 700) { doc.addPage(); y = 50; }
        doc.setFontSize(9);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(26, 26, 46);
        doc.text(labels[k] || k, 40, y);
        y += 12;
        doc.setFont(undefined, 'italic');
        doc.setTextColor(55, 65, 81);
        const lines = doc.splitTextToSize('"' + v + '"', pageWidth - 80);
        doc.text(lines, 40, y);
        y += lines.length * 11 + 12;
      });
      y += 5;
    }
    
    // Suggested probes
    if(c.probes && c.probes.length > 0) {
      if(y > 600) { doc.addPage(); y = 50; }
      doc.setTextColor(204, 0, 0);
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text('SUGGESTED INTERVIEW PROBES', 40, y);
      y += 14;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(9);
      doc.setTextColor(55, 65, 81);
      c.probes.forEach((p, i) => {
        if(y > 720) { doc.addPage(); y = 50; }
        const lines = doc.splitTextToSize((i+1) + '. ' + p, pageWidth - 80);
        doc.text(lines, 40, y);
        y += lines.length * 11 + 4;
      });
    }
  }
  
  // Footer on each page
  const pageCount = doc.internal.getNumberOfPages();
  for(let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(156, 163, 175);
    doc.text('Toyota Marin Hiring System  |  Page ' + i + ' of ' + pageCount, pageWidth/2, doc.internal.pageSize.height - 20, {align: 'center'});
  }
  
  const filename = c.candidateName.replace(/[^a-zA-Z0-9]/g, '_') + '_' + (mode === 'full' ? 'Full' : 'Summary') + '_Report.pdf';
  doc.save(filename);
}
</script>
</body>
</html>
